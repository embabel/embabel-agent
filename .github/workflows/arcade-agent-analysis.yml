name: Arcade Architecture Analysis

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: lemduc/arcade-agent/actions/analyze@v0.1.1
        with:
          arcade-agent-version: "0.1.1"
          source-path: "."
          language: "java"
          primary-algorithm: pkg
          run-secondary-analyses: "true"
          repo-name: "embabel-agent"
