name: Sync Primary To Upgrade

on:
  # push:
  #  branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Test mode: merge (and build) but do NOT update 2.0.0"
        type: boolean
        default: true
      skip_build:
        description: "Skip the Maven build gate (faster test)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-primary-to-upgrade
  cancel-in-progress: false

jobs:
  sync:
    name: Sync primary to upgrade
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}
      - name: Configure git identity
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Testcontainers
        run: |
            mkdir -p /home/runner
            echo "testcontainers.reuse.enable=true" > /home/runner/.testcontainers.properties

      - name: Resolve source PR metadata
        id: source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN || github.token }}
          script: |
            const result = {
              pr_number: '',
              pr_author: '',
            };

            if (context.eventName === 'push') {
              const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });

              const pr = response.data.find(candidate =>
                candidate.merged_at &&
                candidate.base?.ref === 'main'
              ) ?? response.data[0];

              if (pr) {
                result.pr_number = String(pr.number);
                result.pr_author = pr.user?.login || '';
              }

              if (!result.pr_author) {
                result.pr_author = context.actor;
              }
            }

            core.setOutput('pr_number', result.pr_number);
            core.setOutput('pr_author', result.pr_author);

      - name: Merge main into 2.0.0, build, and update on success
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          SOURCE_BRANCH: main
          UPGRADE_BRANCH: 2.0.0
          DATE_FORMAT: mmddyyyy
          BUILD_COMMAND: mvn -U -B test verify
          CREATE_ISSUE: true
          PR_NUMBER: ${{ steps.source.outputs.pr_number }}
          DEVELOPER_GITHUB_LOGIN: ${{ steps.source.outputs.pr_author }}
          # Manual runs default to a safe dry-run; uncheck "dry_run" to perform a real sync.
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SKIP_BUILD_INPUT: ${{ github.event.inputs.skip_build }}
        run: |
            mkdir -p .github/sync-reports

            args=(
              --conflict-file .github/sync-reports/conflicted-files.txt
              --report-file .github/sync-reports/branch-sync-conflict.md
              --build-log .github/sync-reports/build-failure.log
              --create-issue
            )

            # Manual runs default to dry-run unless the dry_run input is unchecked.
            # Any other trigger (e.g. an uncommented push) performs a real sync.
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DRY_RUN}" != "false" ]; then
              args+=(--dry-run --preserve-artifacts)
            fi

            if [ "${SKIP_BUILD_INPUT}" = "true" ]; then
              args+=(--skip-build)
            fi

            if [ -n "${DEVELOPER_GITHUB_LOGIN}" ]; then
              args+=(--issue-assignee "${DEVELOPER_GITHUB_LOGIN}")
            fi

            .github/scripts/sync-primary-to-upgrade.sh "${args[@]}"


      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: branch-sync-failure-report
          path: .github/sync-reports/
          if-no-files-found: ignore

  notify:
    name: Notify branch sync failure
    needs: [sync]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          message="$(printf 'Branch sync failed: %s (%s)\n%s/%s/actions/runs/%s' \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"

          payload="$(jq -n --arg content "${message}" '{content: $content}')"

          curl -fsS \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${DISCORD_WEBHOOK_URL}"
