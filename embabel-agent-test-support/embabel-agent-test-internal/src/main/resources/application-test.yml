spring:
  ai:
    mcp:
      client:
        enabled: false

embabel:
  agent-platform:
    scanning:
      auto: false

  models:
    default-llm: test-llm
    default-embedding-model: test
    embedding-services:
      best: test
      cheapest: test
    llms:
      best: test-llm
      cheapest: test-llm

logging:
  # Pattern is commented out to use the default from logback-embabel.xml (which includes thread name [%t])
  # The <springProperty> tag in logback-embabel.xml reads logging.pattern.console, so setting it here
  # would override the library's default pattern and remove thread names from log output.
  # Only uncomment if you need to customize the pattern for specific tests.
  #pattern:
  #  console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(%logger{0}){cyan} %clr(-){faint} %msg%n"
  level:
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR
